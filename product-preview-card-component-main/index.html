<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>Product Preview Card Component | Responsive UI Design</title>
    <meta
      name="description"
      content="A responsive product preview card component built with modern HTML and CSS. Clean UI design, mobile-friendly layout, and optimized performance."
    />
    <meta
      name="keywords"
      content="product card, frontend component, responsive design, HTML CSS UI, web development, frontend mentor challenge"
    />
    <meta name="author" content="Alokananda Y" />

    <!-- Favicon -->
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <!-- Open Graph (Facebook, LinkedIn) -->
    <meta property="og:title" content="Product Preview Card Component" />
    <meta
      property="og:description"
      content="Modern responsive product card UI built with HTML & CSS."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://yourwebsite.com/" />
    <meta
      property="og:image"
      content="https://yourwebsite.com/images/preview.jpg"
    />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Product Preview Card Component" />
    <meta
      name="twitter:description"
      content="Clean and responsive product preview UI design."
    />
    <meta
      name="twitter:image"
      content="https://yourwebsite.com/images/preview.jpg"
    />

    <!-- Performance -->
    <link rel="preload" href="css/main.css" as="style" />
    <link rel="stylesheet" href="css/main.css" />
  </head>
  <body>
    <main role="main" aria-labelledby="product-title">
      <figure aria-labelledby="product-title">
        <img
          src="images/image-product-desktop.jpg"
          alt="Gabrielle Essence Eau De Parfum perfume bottle placed on a table"
        />
      </figure>

      <section aria-labelledby="product-title">
        <div>
          <h1 aria-hidden="true">Perfume</h1>
          <h2 id="product-title" role="heading" aria-level="1">
            Gabrielle Essence Eau De Parfum
          </h2>
          <p>
            A floral, solar and voluptuous interpretation composed by Olivier
            Polge, Perfumer-Creator for the House of CHANEL.
          </p>
        </div>

        <p aria-label="Current price $149.99, discounted from $169.99">
          $149.99 <span aria-hidden="true">$169.99</span>
        </p>

        <button aria-label="Add Gabrielle Essence Eau De Parfum to cart">
          <img src="images/icon-cart.svg" alt="" aria-hidden="true" />
          Add to Cart
        </button>
      </section>
    </main>

    <footer class="attribution" role="contentinfo">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="#">Alokananda Y</a>.
    </footer>
  </body>
</html>
