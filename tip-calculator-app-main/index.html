<!doctype html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>Tip Calculator App | Split Bills Easily & Accurately</title>
    <meta
      name="description"
      content="A simple and fast tip calculator app to split bills, calculate tips, and manage expenses effortlessly."
    />
    <meta name="author" content="Your Name" />

    <!-- Favicon -->
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/images/favicon-32x32.png"
    />

    <!-- Open Graph (for social sharing) -->
    <meta property="og:title" content="Tip Calculator App" />
    <meta
      property="og:description"
      content="Calculate tips and split bills بسهولة with this modern tip calculator."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://yourdomain.com" />
    <meta property="og:image" content="/images/preview.jpg" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Tip Calculator App" />
    <meta
      name="twitter:description"
      content="A fast and simple tip calculator for splitting bills."
    />
    <meta name="twitter:image" content="/images/preview.jpg" />

    <!-- Performance: Preload Fonts -->
    <link
      rel="preload"
      href="/fonts/SpaceMono-Regular.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />

    <!-- CSS (order matters) -->
    <link rel="stylesheet" href="/css/font-face.css" />
    <link rel="stylesheet" href="/css/global.css" />
    <link rel="stylesheet" href="/css/refactored.css" />
    <script src="app.js" defer></script>
  </head>
  <body class="bg-body">
    <div class="wrapper wrapper--layout">
      <header class="wrapper__header" role="banner">
        <h1 class="wrapper__title text-4">SPLI<span>TTER</span></h1>
      </header>

      <main id="main" class="wrapper__main bg-white p-400" role="main">
        <form
          id="tip-form"
          class="splitter-form gap-600"
          aria-label="Tip calculator form"
        >
          <section
            id="input-section"
            class="splitter-form__section splitter-form__section--input splitter-form__section--grid"
          >
            <!-- Bill -->
            <div class="splitter-form__field">
              <label for="bill-input" class="splitter-form__label">Bill</label>
              <img
                class="splitter-form__dollar"
                src="images/icon-dollar.svg"
                alt="US dollar icon"
              />
              <input
                id="bill-input"
                type="number"
                aria-label="Bill amount"
                class="splitter-form__input splitter-form__input--bill splitter-form__input--number"
              />
            </div>

            <!-- Tip Selection -->
            <div class="splitter-form__field">
              <label class="splitter-form__label">Select Tip %</label>

              <div
                id="tip-group"
                class="splitter-form__tip-group splitter-form__tip-group--grid"
                role="radiogroup"
                aria-label="Tip percentage selection"
              >
                <button
                  data-tip="5"
                  id="tip-5"
                  type="button"
                  role="radio"
                  aria-checked="false"
                  class="splitter-form__button splitter-form__button--tip splitter-form__radio"
                >
                  5%
                </button>
                <button
                  data-tip="10"
                  id="tip-10"
                  type="button"
                  role="radio"
                  aria-checked="false"
                  class="splitter-form__button splitter-form__button--tip splitter-form__radio"
                >
                  10%
                </button>
                <button
                  data-tip="15"
                  id="tip-15"
                  type="button"
                  role="radio"
                  aria-checked="false"
                  class="splitter-form__button splitter-form__button--tip splitter-form__radio"
                >
                  15%
                </button>
                <button
                  data-tip="25"
                  id="tip-25"
                  type="button"
                  role="radio"
                  aria-checked="false"
                  class="splitter-form__button splitter-form__button--tip splitter-form__radio"
                >
                  25%
                </button>
                <button
                  data-tip="50"
                  id="tip-50"
                  type="button"
                  role="radio"
                  aria-checked="false"
                  class="splitter-form__button splitter-form__button--tip splitter-form__radio"
                >
                  50%
                </button>
                <button
                  id="tip-custom"
                  type="button"
                  role="radio"
                  aria-checked="false"
                  class="splitter-form__button splitter-form__button--custom splitter-form__radio"
                >
                  Custom
                </button>
              </div>
            </div>

            <!-- People -->
            <div class="splitter-form__field">
              <label for="people-input" class="splitter-form__label"
                >Number of People</label
              >
              <img
                class="splitter-form__people"
                src="images/icon-person.svg"
                alt="Icon representing people"
              />
              <input
                id="people-input"
                type="number"
                aria-label="Number of people"
                class="splitter-form__input splitter-form__input--people splitter-form__input--number"
              />
            </div>
          </section>

          <!-- Results -->
          <section
            id="result-section"
            class="splitter-form__section splitter-form__section--result bg-green-900"
          >
            <div class="splitter-form__results">
              <div class="splitter-form__result-item">
                <label class="splitter-form__label text-white text-5">
                  Tip Amount <span class="text-grey-400 text-6">/ person</span>
                </label>
                <span
                  id="tip-amount"
                  class="splitter-form__value text-1"
                ></span>
              </div>

              <div class="splitter-form__result-item">
                <label class="splitter-form__label text-white text-5">
                  Total <span class="text-grey-400 text-6">/ person</span>
                </label>
                <span
                  id="total-amount"
                  class="splitter-form__value text-1"
                ></span>
              </div>
            </div>

            <button
              id="reset-btn"
              type="button"
              aria-label="Reset calculator"
              class="splitter-form__button splitter-form__button--reset"
            >
              Reset
            </button>
          </section>
        </form>
      </main>
    </div>

    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="#">Alokananda Y</a>.
    </footer>
  </body>
</html>
