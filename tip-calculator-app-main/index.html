<!doctype html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>Tip Calculator App | Split Bills Easily & Accurately</title>
    <meta
      name="description"
      content="A simple and fast tip calculator app to split bills, calculate tips, and manage expenses effortlessly."
    />
    <meta name="author" content="Your Name" />

    <!-- Favicon -->
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/images/favicon-32x32.png"
    />

    <!-- Open Graph (for social sharing) -->
    <meta property="og:title" content="Tip Calculator App" />
    <meta
      property="og:description"
      content="Calculate tips and split bills بسهولة with this modern tip calculator."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://yourdomain.com" />
    <meta property="og:image" content="/images/preview.jpg" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Tip Calculator App" />
    <meta
      name="twitter:description"
      content="A fast and simple tip calculator for splitting bills."
    />
    <meta name="twitter:image" content="/images/preview.jpg" />

    <!-- Performance: Preload Fonts -->
    <link
      rel="preload"
      href="/fonts/SpaceMono-Regular.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />

    <!-- CSS (order matters) -->
    <link rel="stylesheet" href="/css/font-face.css" />
    <link rel="stylesheet" href="/css/global.css" />
    <link rel="stylesheet" href="/css/main.css" />
  </head>
  <body class="bg-body">
    <div class="wrapper wrapper--layout">
      <header class="wrapper__header" role="banner">
        <h1 class="wrapper__title">SPLI<span>TTER</span></h1>
      </header>

      <main class="wrapper__main bg-white p-400" role="main">
        <form class="splitter-form" aria-label="Tip calculator form">
          <section class="splitter-form__section splitter-form__section--input">
            <label>Bill</label>
            <input
              type="number"
              aria-label="Bill amount"
              class="splitter-form__input splitter-form__input--bill"
            />

            <label>Select Tip %</label>

            <!-- Keyboard-accessible radio group -->
            <div
              class="splitter-form__tip-group"
              role="radiogroup"
              aria-label="Tip percentage selection"
            >
              <button
                type="button"
                role="radio"
                aria-checked="false"
                tabindex="0"
                class="splitter-form__button splitter-form__button--tip"
              >
                5%
              </button>

              <button
                type="button"
                role="radio"
                aria-checked="false"
                tabindex="0"
                class="splitter-form__button splitter-form__button--tip"
              >
                10%
              </button>

              <button
                type="button"
                role="radio"
                aria-checked="false"
                tabindex="0"
                class="splitter-form__button splitter-form__button--tip"
              >
                15%
              </button>

              <button
                type="button"
                role="radio"
                aria-checked="false"
                tabindex="0"
                class="splitter-form__button splitter-form__button--tip"
              >
                25%
              </button>

              <button
                type="button"
                role="radio"
                aria-checked="false"
                tabindex="0"
                class="splitter-form__button splitter-form__button--tip"
              >
                50%
              </button>

              <!-- Custom acts like a special radio option -->
              <button
                type="button"
                role="radio"
                aria-checked="false"
                tabindex="0"
                class="splitter-form__button splitter-form__button--custom"
              >
                Custom
              </button>
            </div>

            <label>Number of People</label>
            <input
              type="number"
              aria-label="Number of people"
              class="splitter-form__input splitter-form__input--people"
            />
          </section>

          <section
            class="splitter-form__section splitter-form__section--result bg-green-900"
          >
            <label class="splitter-form__label">
              Tip Amount <span>/ person</span>
            </label>

            <label class="splitter-form__label">
              Total <span>/ person</span>
            </label>

            <button
              type="button"
              aria-label="Reset calculator"
              class="splitter-form__button splitter-form__button--reset"
            >
              Reset
            </button>
          </section>
        </form>
      </main>
    </div>

    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="#">Alokananda Y</a>.
    </footer>
  </body>
</html>
