<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Meta Description -->
    <meta
      name="description"
      content="Learn HTML & CSS foundations, the core languages behind web development that define structure, content, and presentation."
    />

    <!-- Meta Keywords (optional but can help) -->
    <meta
      name="keywords"
      content="HTML, CSS, web development, foundations, learning, website structure, content presentation"
    />

    <!-- Title Tag (should be descriptive) -->
    <title>HTML & CSS Foundations | Learn the Basics of Web Development</title>

    <!-- Open Graph Meta Tags for Social Media Optimization -->
    <meta
      property="og:title"
      content="HTML & CSS Foundations | Learn the Basics of Web Development"
    />
    <meta
      property="og:description"
      content="Learn HTML & CSS foundations, the core languages behind web development that define structure, content, and presentation."
    />
    <meta property="og:image" content="assets/images/blog.png" />
    <meta
      property="og:url"
      content="https://alok-38.github.io/frontendMentor/blog-preview-card/"
    />
    <meta property="og:type" content="article" />

    <!-- Twitter Card Meta Tags for Twitter Optimization -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="HTML & CSS Foundations | Learn the Basics of Web Development"
    />
    <meta
      name="twitter:description"
      content="Learn HTML & CSS foundations, the core languages behind web development that define structure, content, and presentation."
    />
    <meta name="twitter:image" content="assets/images/blog.png" />

    <!-- Link to CSS Stylesheet -->
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <main>
      <header>
        <img src="assets/images/blog.png" alt="header blog image" />
      </header>
      <article>
        <a href="#">Learning</a>
        <p>Published 21 dec 2023</p>
        <h1>HTML &amp; CSS foundations</h1>
        <p>
          These languages are the backbone of every website, defining structure,
          content, and presentation.
        </p>
      </article>
      <footer>
        <img src="assets/images/userpic.png" alt="user picture" />
        <span>Greg Hooper</span>
      </footer>
    </main>
  </body>
</html>
