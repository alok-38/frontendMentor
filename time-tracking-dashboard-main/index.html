<!doctype html>
<html lang="en">
  <head>
    <!-- Basic Meta -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Time tracking dashboard to monitor daily, weekly, and monthly productivity. Built with modern frontend technologies for performance and usability."
    />
    <meta
      name="keywords"
      content="time tracking dashboard, productivity app, frontend project, time management, dashboard UI"
    />
    <meta name="author" content="Your Name" />

    <!-- Title (optimized with keywords) -->
    <title>Time Tracking Dashboard | Productivity & Time Management App</title>

    <!-- Favicon -->
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <!-- Open Graph (for social sharing) -->
    <meta property="og:title" content="Time Tracking Dashboard" />
    <meta
      property="og:description"
      content="Track your productivity with this modern time tracking dashboard."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://yourwebsite.com" />
    <meta
      property="og:image"
      content="https://yourwebsite.com/images/preview.png"
    />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Time Tracking Dashboard" />
    <meta
      name="twitter:description"
      content="Monitor your time and productivity efficiently."
    />
    <meta
      name="twitter:image"
      content="https://yourwebsite.com/images/preview.png"
    />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://yourwebsite.com" />

    <!-- Performance: Preload important assets -->
    <link rel="preload" href="css/main.css" as="style" />
    <link rel="preload" href="css/root-variables.css" as="style" />

    <!-- CSS -->
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/font-face.css" />
    <link rel="stylesheet" href="css/root-variables.css" />
    <link rel="stylesheet" href="css/main.css" />
  </head>
  <body class="bg-navy-950">
    <main aria-label="Time tracking dashboard">
      <section
        class="dashboard__profile bg-navy-900"
        aria-labelledby="profile-title"
      >
        <div class="dashboard__profile-header bg-purple p-400">
          <img
            src="images/image-jeremy.png"
            alt="Jeremy Robson"
            class="dashboard__avatar"
          />
          <h1 id="profile-title" class="dashboard__title text-navy-200 text-6">
            Report for
            <span class="dashboard__name text-2 text-white">Jeremy Robson</span>
          </h1>
        </div>

        <nav
          aria-label="Timeframe"
          class="dashboard__filters text-5 text-purple--500"
        >
          <button class="dashboard__filter dashboard__filter--active">
            Daily
          </button>
          <button class="dashboard__filter">Weekly</button>
          <button class="dashboard__filter">Monthly</button>
        </nav>
      </section>

      <section aria-label="Activity data" class="dashboard__cards">
        <div class="card-wrapper card-wrapper--work">
          <div class="card--bg"></div>
          <article class="card card--work">
            <div class="card__header">
              <h2 class="card__title">Work</h2>
              <div class="card__menu">
                <img
                  class="ellipsis__icon"
                  src="images/icon-ellipsis.svg"
                  alt="ellipsis icon"
                />
                <img
                  class="ellipsis__icon"
                  src="images/icon-ellipsis.svg"
                  alt="ellipsis icon"
                />
                <img
                  class="ellipsis__icon"
                  src="images/icon-ellipsis.svg"
                  alt="ellipsis icon"
                />
              </div>
            </div>
            <div class="card__footer">
              <p class="card__current">32hrs</p>
              <p class="card__previous">Last Week - 36hrs</p>
            </div>
          </article>
        </div>

        <div class="card-wrapper card-wrapper--play">
          <article class="card card--play">
            <div class="card__header">
              <h2 class="card__title">Play</h2>
              <div class="card__menu">
                <img
                  class="ellipsis__icon"
                  src="images/icon-ellipsis.svg"
                  alt="ellipsis icon"
                />
                <img
                  class="ellipsis__icon"
                  src="images/icon-ellipsis.svg"
                  alt="ellipsis icon"
                />
                <img
                  class="ellipsis__icon"
                  src="images/icon-ellipsis.svg"
                  alt="ellipsis icon"
                />
              </div>
            </div>
            <div class="card__footer">
              <p class="card__current">10hrs</p>
              <p class="card__previous">Last Week - 8hrs</p>
            </div>
          </article>
        </div>

        <div class="card-wrapper card-wrapper--study">
          <article class="card card--study">
            <div class="card__header">
              <h2 class="card__title">Study</h2>
              <div class="card__menu">
                <img
                  class="ellipsis__icon"
                  src="images/icon-ellipsis.svg"
                  alt="ellipsis icon"
                />
                <img
                  class="ellipsis__icon"
                  src="images/icon-ellipsis.svg"
                  alt="ellipsis icon"
                />
                <img
                  class="ellipsis__icon"
                  src="images/icon-ellipsis.svg"
                  alt="ellipsis icon"
                />
              </div>
            </div>
            <div class="card__footer">
              <p class="card__current">4hrs</p>
              <p class="card__previous">Last Week - 7hrs</p>
            </div>
          </article>
        </div>

        <div class="card-wrapper card-wrapper--exercise">
          <article class="card card--exercise">
            <div class="card__header">
              <h2 class="card__title">Exercise</h2>
              <div class="card__menu">
                <img
                  class="ellipsis__icon"
                  src="images/icon-ellipsis.svg"
                  alt="ellipsis icon"
                />
                <img
                  class="ellipsis__icon"
                  src="images/icon-ellipsis.svg"
                  alt="ellipsis icon"
                />
                <img
                  class="ellipsis__icon"
                  src="images/icon-ellipsis.svg"
                  alt="ellipsis icon"
                />
              </div>
            </div>
            <div class="card__footer">
              <p class="card__current">4hrs</p>
              <p class="card__previous">Last Week - 5hrs</p>
            </div>
          </article>
        </div>

        <div class="card-wrapper card-wrapper--social">
          <article class="card card--social">
            <div class="card__header">
              <h2 class="card__title">Social</h2>
              <div class="card__menu">
                <img
                  class="ellipsis__icon"
                  src="images/icon-ellipsis.svg"
                  alt="ellipsis icon"
                />
                <img
                  class="ellipsis__icon"
                  src="images/icon-ellipsis.svg"
                  alt="ellipsis icon"
                />
                <img
                  class="ellipsis__icon"
                  src="images/icon-ellipsis.svg"
                  alt="ellipsis icon"
                />
              </div>
            </div>
            <div class="card__footer">
              <p class="card__current">5hrs</p>
              <p class="card__previous">Last Week - 10hrs</p>
            </div>
          </article>
        </div>

        <div class="card-wrapper card-wrapper--self-care">
          <article class="card card--self-care">
            <div class="card__header">
              <h2 class="card__title">Self Care</h2>
              <div class="card__menu">
                <img
                  class="ellipsis__icon"
                  src="images/icon-ellipsis.svg"
                  alt="ellipsis icon"
                />
                <img
                  class="ellipsis__icon"
                  src="images/icon-ellipsis.svg"
                  alt="ellipsis icon"
                />
                <img
                  class="ellipsis__icon"
                  src="images/icon-ellipsis.svg"
                  alt="ellipsis icon"
                />
              </div>
            </div>
            <div class="card__footer">
              <p class="card__current">2hrs</p>
              <p class="card__previous">Last Week - 2hrs</p>
            </div>
          </article>
        </div>
      </section>
    </main>

    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="#">Alokananda Y</a>.
    </footer>
  </body>
</html>
