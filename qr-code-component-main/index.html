<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Improve your front-end development skills with this QR code component, a project from Frontend Mentor."
    />
    <meta
      name="keywords"
      content="QR code, Frontend Mentor, front-end development, web development, coding skills, beginner projects"
    />
    <meta name="author" content="Alok" />
    <title>QR Code Component - Frontend Mentor Project</title>
    <link
      rel="shortcut icon"
      href="images/favicon-32x32.png"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <img
        src="images/QR.png"
        alt="A QR code that leads to Frontend Mentor's website"
      />
      <div>
        <h3>Improve your front-end skills by building projects</h3>
        <p>
          Scan the QR code to visit Frontend Mentor and take your coding skills
          to the next level
        </p>
      </div>
    </main>
  </body>
</html>
