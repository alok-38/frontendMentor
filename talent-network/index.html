<!doctype html>
<html lang="en">
  <head>
    <!-- Basic Meta -->
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>Join the Doom 3 Talent Network | Careers & Opportunities</title>
    <meta
      name="description"
      content="Join the Doom 3 Talent Network to explore career opportunities, connect with recruiters, and stay updated on new roles in gaming and development."
    />
    <meta
      name="keywords"
      content="Doom 3 jobs, gaming careers, talent network, game development jobs, id Software careers"
    />
    <meta name="author" content="Doom 3 Careers" />
    <link rel="canonical" href="https://yourdomain.com/doom3-talent-network" />

    <!-- Open Graph -->
    <meta property="og:title" content="Join the Doom 3 Talent Network" />
    <meta
      property="og:description"
      content="Connect with top gaming opportunities and stay updated on Doom 3 career openings."
    />
    <meta property="og:type" content="website" />
    <meta
      property="og:url"
      content="https://yourdomain.com/doom3-talent-network"
    />
    <meta
      property="og:image"
      content="https://yourdomain.com/images/doom3-preview.jpg"
    />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Join the Doom 3 Talent Network" />
    <meta
      name="twitter:description"
      content="Explore gaming careers and join the Doom 3 talent network today."
    />
    <meta
      name="twitter:image"
      content="https://yourdomain.com/images/doom3-preview.jpg"
    />

    <!-- 🚀 Preconnect (faster font loading) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- 🚀 Preload critical font (replace with actual woff2 if self-hosted) -->
    <link
      rel="preload"
      href="https://fonts.gstatic.com/s/inter/v12/UcCO3FwrK3iLTcviYwY.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />

    <!-- 🚀 Preload LCP (hero) image -->
    <link rel="preload" as="image" href="/images/hero.webp" />

    <!-- Fonts (reduced weights for speed) -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- 🚀 Non-blocking CSS -->
    <link
      rel="stylesheet"
      href="style.css"
      media="print"
      onload="this.media = 'all'"
    />

    <!-- Favicon -->
    <link rel="icon" href="hell.png" type="image/x-icon" />

    <!-- Theme Color -->
    <meta name="theme-color" content="#0a0a0a" />
    <!-- Hero -->
    <link rel="preload" as="image" href="/images/hellknight-hero.webp" />
  </head>
  <body>
    <div class="form">
      <img
        src="images/hellknight-hero.webp"
        alt="Doom 3 Hell Knight"
        width="1600"
        height="900"
        fetchpriority="high"
        decoding="async"
        loading="eager"
        class="form-image"
      />
    </div>
  </body>
</html>
