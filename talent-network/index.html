<!doctype html>
<html lang="en">
  <head>
    <!-- Basic Meta -->
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>Join the Doom 3 Talent Network | Careers & Opportunities</title>
    <meta
      name="description"
      content="Join the Doom 3 Talent Network to explore career opportunities, connect with recruiters, and stay updated on new roles in gaming and development."
    />
    <meta
      name="keywords"
      content="Doom 3 jobs, gaming careers, talent network, game development jobs, id Software careers"
    />
    <meta name="author" content="Doom 3 Careers" />
    <link rel="canonical" href="https://yourdomain.com/doom3-talent-network" />

    <!-- Open Graph -->
    <meta property="og:title" content="Join the Doom 3 Talent Network" />
    <meta
      property="og:description"
      content="Connect with top gaming opportunities and stay updated on Doom 3 career openings."
    />
    <meta property="og:type" content="website" />
    <meta
      property="og:url"
      content="https://yourdomain.com/doom3-talent-network"
    />
    <meta
      property="og:image"
      content="https://yourdomain.com/images/doom3-preview.jpg"
    />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Join the Doom 3 Talent Network" />
    <meta
      name="twitter:description"
      content="Explore gaming careers and join the Doom 3 talent network today."
    />
    <meta
      name="twitter:image"
      content="https://yourdomain.com/images/doom3-preview.jpg"
    />

    <!-- 🚀 Preconnect (faster font loading) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- 🚀 Preload critical font (replace with actual woff2 if self-hosted) -->
    <link
      rel="preload"
      href="https://fonts.gstatic.com/s/inter/v12/UcCO3FwrK3iLTcviYwY.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />

    <!-- 🚀 Preload LCP (hero) image -->
    <link rel="preload" as="image" href="/images/hero.webp" />

    <!-- Fonts (reduced weights for speed) -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- 🚀 Non-blocking CSS -->
    <link
      rel="stylesheet"
      href="style.css"
      media="print"
      onload="this.media = 'all'"
    />

    <!-- Favicon -->
    <link rel="icon" href="hell.png" type="image/x-icon" />

    <!-- Theme Color -->
    <meta name="theme-color" content="#0a0a0a" />
    <!-- Hero -->
    <link rel="preload" as="image" href="/images/hellknight-hero.webp" />
  </head>
  <body>
    <div class="talent-form" id="talent-form">
      <img
        src="images/hellknight-hero.webp"
        alt="Doom 3 Hell Knight"
        width="1600"
        fetchpriority="high"
        class="talent-form__image"
      />

      <h1 class="talent-form__title">Join the Talent Network</h1>

      <p class="talent-form__description">
        Don't see the right role today? Submit your resume and interests and
        we'll reach out when relevant opportunities open.
      </p>

      <form class="talent-form__form" novalidate>
        <!-- Department -->
        <fieldset class="talent-form__group">
          <legend class="talent-form__legend">
            What department are you interested in?
            <span aria-hidden="true">*</span>
          </legend>

          <div class="talent-form__options">
            <label class="talent-form__option">
              <input type="checkbox" name="department" value="sales" />
              <span>Sales</span>
            </label>

            <label class="talent-form__option">
              <input type="checkbox" name="department" value="marketing" />
              <span>Marketing</span>
            </label>

            <label class="talent-form__option">
              <input type="checkbox" name="department" value="engineering" />
              <span>Engineering</span>
            </label>
          </div>
        </fieldset>

        <!-- Name -->
        <div class="talent-form__group">
          <label for="first-name" class="talent-form__label"
            >First Name *</label
          >
          <input
            id="first-name"
            name="first_name"
            type="text"
            required
            class="talent-form__input"
          />
        </div>

        <div class="talent-form__group">
          <label for="last-name" class="talent-form__label">Last Name *</label>
          <input
            id="last-name"
            name="last_name"
            type="text"
            required
            class="talent-form__input"
          />
        </div>

        <!-- Email -->
        <div class="talent-form__group">
          <label for="email" class="talent-form__label">Email Address *</label>
          <input
            id="email"
            name="email"
            type="email"
            required
            class="talent-form__input"
          />
        </div>

        <!-- Location -->
        <div class="talent-form__group">
          <label for="location" class="talent-form__label">Location *</label>
          <select
            id="location"
            name="location"
            required
            class="talent-form__select"
          >
            <option value="">Select...</option>
            <option value="us">United States</option>
            <option value="uk">United Kingdom</option>
            <option value="india">India</option>
            <option value="other">Other</option>
          </select>
        </div>

        <!-- LinkedIn -->
        <div class="talent-form__group">
          <label for="linkedin" class="talent-form__label"
            >LinkedIn URL *</label
          >
          <input
            id="linkedin"
            name="linkedin"
            type="url"
            placeholder="https://linkedin.com/in/your-profile"
            required
            class="talent-form__input"
          />
        </div>

        <!-- Level -->
        <fieldset class="talent-form__group">
          <legend class="talent-form__legend">Experience Level</legend>

          <label class="talent-form__option">
            <input type="radio" name="level" value="entry" />
            <span>Entry-level</span>
          </label>

          <label class="talent-form__option">
            <input type="radio" name="level" value="mid" />
            <span>Mid-level</span>
          </label>

          <label class="talent-form__option">
            <input type="radio" name="level" value="senior" />
            <span>Senior</span>
          </label>
        </fieldset>

        <!-- Resume -->
        <div class="talent-form__group">
          <label for="resume" class="talent-form__label">Resume</label>
          <input
            id="resume"
            name="resume"
            type="file"
            accept=".pdf,.doc,.docx"
            class="talent-form__file"
          />
        </div>

        <!-- Consent -->
        <p class="talent-form__disclaimer">
          By submitting, you agree to receive communications about
          opportunities.
        </p>

        <!-- Actions -->
        <div class="talent-form__actions">
          <button
            type="submit"
            class="talent-form__button talent-form__button--primary"
          >
            Submit and save
          </button>

          <button
            type="submit"
            class="talent-form__button talent-form__button--secondary"
          >
            Submit without saving
          </button>
        </div>
      </form>
    </div>
  </body>
</html>
