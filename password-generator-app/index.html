<!doctype html>
<html lang="en">
  <head>
    <!-- =========================
       BASIC META
       ========================= -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Better rendering consistency -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <!-- =========================
       SEO
       ========================= -->
    <title>Password Generator App | Secure Random Password Tool</title>

    <meta
      name="description"
      content="Generate strong, secure passwords instantly. Customize length and complexity with this fast and accessible password generator app."
    />

    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#08070B" />

    <!-- Optional but useful -->
    <meta name="author" content="Frontend Mentor Challenge" />

    <!-- =========================
       SOCIAL (OG)
       ========================= -->
    <meta property="og:title" content="Password Generator App" />
    <meta
      property="og:description"
      content="Generate strong and secure passwords instantly with full customization."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="./assets/images/preview.png" />

    <meta name="twitter:card" content="summary_large_image" />

    <!-- =========================
       FAVICON
       ========================= -->
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <!-- =========================
       PERFORMANCE (WYSIWYG IMPROVEMENT)
       ========================= -->

    <!-- Preload fonts (important for layout stability) -->
    <link
      rel="preload"
      href="./assets/fonts/JetBrainsMono-VariableFont_wght.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />

    <!-- Preload CSS (optional but helps rendering speed) -->
    <link rel="preload" href="css/global.css" as="style" />

    <!-- =========================
       STYLES (ORDER MATTERS)
       ========================= -->

    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/font-face.css" />
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/main.css" />
  </head>
  <body>
    <div class="wrapper">
      <header><h1>Password Generator</h1></header>
      <section>
        <input type="text" name="" id="" placeholder="P4$5W0rD!" />
        <img
          src="assets/images/icon-copy.svg"
          alt="copy icon to copy password"
        />
      </section>
      <section>
        <div>
          Character Length
        </div>
        Include Uppercase Letters Include Lowercase Letters
        Include Numbers Include Symbols Strength <button>Generate</button>
      </section>
    </div>
  </body>
</html>
