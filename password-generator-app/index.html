<!doctype html>
<html lang="en">
  <head>
    <!-- =========================
       BASIC META
       ========================= -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Better rendering consistency -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <!-- =========================
       SEO
       ========================= -->
    <title>Password Generator App | Secure Random Password Tool</title>

    <meta
      name="description"
      content="Generate strong, secure passwords instantly. Customize length and complexity with this fast and accessible password generator app."
    />

    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#08070B" />

    <!-- Optional but useful -->
    <meta name="author" content="Frontend Mentor Challenge" />

    <!-- =========================
       SOCIAL (OG)
       ========================= -->
    <meta property="og:title" content="Password Generator App" />
    <meta
      property="og:description"
      content="Generate strong and secure passwords instantly with full customization."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="./assets/images/preview.png" />

    <meta name="twitter:card" content="summary_large_image" />

    <!-- =========================
       FAVICON
       ========================= -->
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <!-- =========================
       PERFORMANCE (WYSIWYG IMPROVEMENT)
       ========================= -->

    <!-- Preload fonts (important for layout stability) -->
    <link
      rel="preload"
      href="./assets/fonts/JetBrainsMono-VariableFont_wght.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />

    <!-- Preload CSS (optional but helps rendering speed) -->
    <link rel="preload" href="css/global.css" as="style" />

    <!-- =========================
       STYLES
       ========================= -->

    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/font-face.css" />
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/main.css" />
  </head>
  <body>
    <div
      class="wrapper wrapper--password-generator gap-400"
      id="password-generator"
      role="application"
      aria-labelledby="password-generator-title"
    >
      <header
        class="wrapper__header wrapper__header--primary"
        id="password-generator-header"
      >
        <h1
          class="wrapper__title text-2 text-grey-600"
          id="password-generator-title"
        >
          Password Generator
        </h1>
      </header>

      <section
        class="wrapper__output wrapper__output--password flex bg-grey-800"
        id="password-output-section"
        aria-labelledby="generated-password-label"
      >
        <input
          class="wrapper__input wrapper__input--password text-1"
          type="text"
          name="generated-password"
          id="generated-password"
          placeholder="P4$5W0rD!"
          aria-label="Generated password"
          aria-describedby="generated-password-label"
          readonly
          autocomplete="off"
          spellcheck="false"
        />

        <img
          class="wrapper__icon wrapper__icon--copy"
          id="copy-password-button"
          src="assets/images/icon-copy.svg"
          alt="Copy generated password"
          role="button"
          tabindex="0"
          aria-label="Copy password to clipboard"
        />
      </section>

      <section
        class="wrapper__controls wrapper__controls--generator bg-grey-800 flex"
        id="password-generator-controls"
        aria-labelledby="generator-controls-title"
      >
        <div
          class="wrapper__length wrapper__length--control flex gap-200"
          id="character-length-control"
        >
          <div class="wrapper__length-header flex" id="character-length-header">
            <h2 class="wrapper__subtitle text-3" id="character-length-title">
              Character Length
            </h2>

            <span
              class="wrapper__length-value text-1 text-green-200"
              id="character-length-value"
              aria-live="polite"
              aria-atomic="true"
            >
              
            </span>
          </div>

          <input
            class="wrapper__slider wrapper__slider--length"
            id="character-length-wrapper__slider"
            type="range"
            min="0"
            max="20"
            value="0"
          />
        </div>


        <div
          class="wrapper__options wrapper__options--checkboxes flex"
          id="password-options"
          role="group"
          aria-labelledby="password-options-title"
        >
          <div class="wrapper__option wrapper__option--uppercase flex flex gap-300">
            <input
              class="wrapper__checkbox wrapper__checkbox--uppercase"
              type="checkbox"
              name="include-uppercase"
              id="include-uppercase"
            />
            <label
              class="wrapper__checkbox-label wrapper__checkbox-label--uppercase text-3 text-grey-200"
              for="include-uppercase"
              id="include-uppercase-label"
            >
              Include Uppercase Letters
            </label>
          </div>

          <div class="wrapper__option wrapper__option--lowercase flex gap-300">
            <input
              class="wrapper__checkbox wrapper__checkbox--lowercase"
              type="checkbox"
              name="include-lowercase"
              id="include-lowercase"
            />
            <label
              class="wrapper__checkbox-label wrapper__checkbox-label--lowercase text-3 text-grey-200"
              for="include-lowercase"
              id="include-lowercase-label"
            >
              Include Lowercase Letters
            </label>
          </div>

          <div class="wrapper__option wrapper__option--numbers flex gap-300">
            <input
              class="wrapper__checkbox wrapper__checkbox--numbers"
              type="checkbox"
              name="include-numbers"
              id="include-numbers"
            />
            <label
              class="wrapper__checkbox-label wrapper__checkbox-label--numbers text-3 text-grey-200"
              for="include-numbers"
              id="include-numbers-label"
            >
              Include Numbers
            </label>
          </div>

          <div class="wrapper__option wrapper__option--symbols flex gap-300">
            <input
              class="wrapper__checkbox wrapper__checkbox--symbols"
              type="checkbox"
              name="include-symbols"
              id="include-symbols"
            />
            <label
              class="wrapper__checkbox-label wrapper__checkbox-label--symbols text-3 text-grey-200"
              for="include-symbols"
              id="include-symbols-label"
            >
              Include Symbols
            </label>
          </div>
        </div>

        <div
          class="wrapper__strength wrapper__strength--indicator bg-grey-850 flex"
          id="password-strength"
          aria-labelledby="password-strength-title"
          aria-live="polite"
        >
          <h3 class="wrapper__strength-title text-grey-600" id="password-strength-title text-3">
            Strength
          </h3>

          <div
            class="wrapper__strength-bars flex gap-100"
            id="password-strength-bars"
            role="img"
            aria-label="Password strength indicator"
          >
            <div
              class="wrapper__strength-bar wrapper__strength-bar--1"
              id="strength-bar-1"
              aria-hidden="true"
            ></div>

            <div
              class="wrapper__strength-bar wrapper__strength-bar--2"
              id="strength-bar-2"
              aria-hidden="true"
            ></div>

            <div
              class="wrapper__strength-bar wrapper__strength-bar--3"
              id="strength-bar-3"
              aria-hidden="true"
            ></div>

            <div
              class="wrapper__strength-bar wrapper__strength-bar--4"
              id="strength-bar-4"
              aria-hidden="true"
            ></div>
          </div>
        </div>

        <button
          class="wrapper__button wrapper__button--generate bg-green-200 text-3 text-grey-800 flex "
          id="generate-password-button"
          type="button"
          aria-label="Generate password"
        >
          Generate
          <img src="assets/images/icon-arrow-right.svg" alt="right arrow icon on a button">
        </button>
      </section>
    </div>
  </body>
</html>
