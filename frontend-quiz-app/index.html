<!doctype html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Title (VERY important for SEO) -->
    <title>Frontend Quiz App | Test Your Web Development Knowledge</title>

    <!-- Meta description -->
    <meta
      name="description"
      content="Challenge your frontend development skills with this interactive quiz app. Test your knowledge of HTML, CSS, and JavaScript."
    />

    <!-- Robots -->
    <meta name="robots" content="index, follow" />

    <!-- Theme color (mobile browsers) -->
    <meta name="theme-color" content="#306AFF" />

    <!-- Favicon -->
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <!-- Fonts preload -->
    <link
      rel="preload"
      href="./assets/fonts/converted/Rubik-VariableFont_wght.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="./assets/fonts/converted/Rubik-Italic-VariableFont_wght.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />

    <!-- CSS -->
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/main.css" />

    <!-- Open Graph (for sharing) -->
    <meta property="og:title" content="Frontend Quiz App" />
    <meta
      property="og:description"
      content="Test your frontend knowledge with this interactive quiz app."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="./preview.jpg" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <!-- script -->
    <script src="app.js" defer></script>
  </head>

  <body class="flex items-center justify-center bg">
    <div class="wrapper flex flex-col gap-800">
      <!-- ================= HEADER ================= -->
      <header
        class="header flex justify-between items-center text-4"
        id="app-header"
      >
        <div class="header__title flex gap-300 items-center">
          <div class="bg-header-img flex items-center justify-center">
            <img
              class="header__icon"
              src="assets/images/icon-accessibility.svg"
              alt=""
              aria-hidden="true"
            />
          </div>
          <span class="header__text">Accessibility</span>
        </div>

        <div
          class="header__theme-toggle flex items-center gap-200"
          role="group"
          aria-label="Theme switcher"
        >
          <span id="theme-toggle-label" class="visually-hidden">
            Toggle dark mode
          </span>

          <img
            class="header__theme-icon"
            src="assets/images/icon-sun-dark.svg"
            alt=""
            aria-hidden="true"
          />

          <button
            id="theme-toggle"
            class="toggle toggle--theme"
            type="button"
            role="switch"
            aria-checked="false"
            aria-labelledby="theme-toggle-label"
          >
            <span class="toggle__thumb"></span>
          </button>

          <img
            class="header__theme-icon"
            src="assets/images/icon-moon-dark.svg"
            alt=""
            aria-hidden="true"
          />
        </div>
      </header>

      <!-- ================= MAIN ================= -->
      <main class="quiz" id="quiz-app" aria-label="Frontend quiz application">
        <!-- ===== MENU ===== -->
        <div
          class="quiz__screen quiz__screen--menu flex gap-1600 items-start"
          id="quiz-menu"
          role="region"
          aria-labelledby="quiz-menu-title"
        >
          <section
            class="quiz__intro flex flex-col gap-600"
            aria-labelledby="quiz-menu-title"
          >
            <h1
              id="quiz-menu-title"
              class="quiz__title text-2-light flex flex-col gap-100"
            >
              Welcome to the <span class="text-2">Frontend Quiz!</span>
            </h1>
            <p class="quiz__subtitle text-6">Pick a subject to get started.</p>
          </section>

          <section class="quiz__topics-section flex">
            <ul class="quiz__topics flex flex-col gap-200" role="list">
              <li class="quiz__topic flex p-400 gap-500">
                <img src="assets/images/icon-html.svg" alt="HTML icon" />
                <button
                  class="quiz__topic-btn text-4"
                  type="button"
                  aria-label="Start HTML quiz"
                >
                  HTML
                </button>
              </li>
              <li class="quiz__topic flex p-400 gap-500">
                <img src="assets/images/icon-css.svg" alt="CSS icon" />
                <button
                  class="quiz__topic-btn text-4"
                  type="button"
                  aria-label="Start CSS quiz"
                >
                  CSS
                </button>
              </li>
              <li class="quiz__topic flex p-400 gap-500">
                <img src="assets/images/icon-js.svg" alt="JavaScript icon" />
                <button
                  class="quiz__topic-btn text-4"
                  type="button"
                  aria-label="Start JavaScript quiz"
                >
                  JavaScript
                </button>
              </li>
              <li class="quiz__topic flex p-400 gap-500">
                <img
                  src="assets/images/icon-accessibility.svg"
                  alt="Accessibility ico"
                />
                <button
                  class="quiz__topic-btn text-4"
                  type="button"
                  aria-label="Start Accessibility quiz"
                >
                  Accessibility
                </button>
              </li>
            </ul>
          </section>
        </div>

        <!-- ===== QUESTION ===== -->
        <div
          class="quiz__screen quiz__screen--question"
          id="quiz-question"
          hidden
          role="region"
          aria-labelledby="question-text"
        >
          <section
            class="quiz__question-section"
            aria-labelledby="question-text"
          >
            <h2 id="question-text" class="quiz__question" tabindex="-1">
              Question
            </h2>
          </section>

          <section class="quiz__answers-section">
            <p class="quiz__progress" role="status">
              Question <span id="question-number">1</span> of
              <span id="total-questions">10</span>
            </p>

            <form class="quiz__form">
              <fieldset class="quiz__options">
                <legend class="visually-hidden">Choose an answer</legend>

                <label class="quiz__option" for="answer-a">
                  <input id="answer-a" type="radio" name="answer" value="A" />
                  <span>A</span>
                </label>

                <label class="quiz__option" for="answer-b">
                  <input id="answer-b" type="radio" name="answer" value="B" />
                  <span>B</span>
                </label>

                <label class="quiz__option" for="answer-c">
                  <input id="answer-c" type="radio" name="answer" value="C" />
                  <span>C</span>
                </label>

                <label class="quiz__option" for="answer-d">
                  <input id="answer-d" type="radio" name="answer" value="D" />
                  <span>D</span>
                </label>
              </fieldset>

              <button type="submit" class="quiz__submit" disabled>
                Submit answer
              </button>
            </form>
          </section>
        </div>

        <!-- ===== RESULT ===== -->
        <div
          class="quiz__screen quiz__screen--result"
          id="quiz-result"
          hidden
          role="region"
          aria-labelledby="result-title"
        >
          <section class="quiz__result-section" aria-labelledby="result-title">
            <h2 id="result-title" class="quiz__title">Quiz completed</h2>

            <p class="quiz__score-text">
              You scored
              <strong id="score" class="quiz__score">0</strong>
            </p>
          </section>

          <section class="quiz__score-section">
            <p class="quiz__score-total">
              out of <span id="score-total">10</span>
            </p>

            <button class="quiz__restart" type="button">Play again</button>
          </section>
        </div>
      </main>
    </div>
  </body>
</html>
