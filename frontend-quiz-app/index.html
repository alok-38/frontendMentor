<!doctype html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Title (VERY important for SEO) -->
    <title>Frontend Quiz App | Test Your Web Development Knowledge</title>

    <!-- Meta description -->
    <meta
      name="description"
      content="Challenge your frontend development skills with this interactive quiz app. Test your knowledge of HTML, CSS, and JavaScript."
    />

    <!-- Robots -->
    <meta name="robots" content="index, follow" />

    <!-- Theme color (mobile browsers) -->
    <meta name="theme-color" content="#306AFF" />

    <!-- Favicon -->
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <!-- Fonts preload -->
    <link
      rel="preload"
      href="./assets/fonts/converted/Rubik-VariableFont_wght.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="./assets/fonts/converted/Rubik-Italic-VariableFont_wght.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />

    <!-- CSS -->
    <link rel="stylesheet" href="css/global.css" />

    <!-- Open Graph (for sharing) -->
    <meta property="og:title" content="Frontend Quiz App" />
    <meta
      property="og:description"
      content="Test your frontend knowledge with this interactive quiz app."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="./preview.jpg" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
  </head>
  <body>
    <!-- Quiz menu start -->

    Welcome to the Frontend Quiz! Pick a subject to get started. HTML CSS
    JavaScript Accessibility

    <!-- Quiz menu end -->

    <!-- Quiz question start -->

    Question
    <!-- number -->
    of 10 A B C D Submit answer

    <!-- Quiz question end -->

    <!-- Quiz completed start -->

    Quiz completed You scored...

    <!-- score -->
    out of 10

    <!-- Quiz completed end -->
  </body>
</html>
